<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Administrar Accesos - Sistema Agroalpha</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <!-- Estilos globales -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="components.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-content {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            transition: margin-left 0.3s;
        }

        .dashboard-section {
            margin-bottom: 30px;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title h1 i {
            color: var(--primary-color);
        }

        .add-module-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .add-module-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
        }

        .admin-panels {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        /* Panel de roles */
        .roles-panel {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .roles-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .role-item {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
        }

        .role-item:hover {
            background: var(--bg-secondary);
            transform: translateX(4px);
        }

        .role-item.active {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
        }

        .role-item.active i {
            color: white;
        }

        /* Panel de módulos */
        .modules-panel {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .modules-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modules-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
            max-height: 550px;
            overflow-y: auto;
            padding: 4px;
        }

        .module-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.2s;
            position: relative;
        }

        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
            border-color: var(--primary-light);
        }

        .delete-module {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #dc3545;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: 0.9rem;
        }

        .delete-module:hover {
            opacity: 1;
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .module-icon {
            width: 40px;
            height: 40px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--primary-color);
        }

        .module-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .module-description {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .module-link {
            font-size: 0.7rem;
            color: var(--primary-color);
            margin-bottom: 12px;
            word-break: break-all;
            font-family: monospace;
        }

        .module-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--success-color, #28a745);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        /* Botones de acción */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            box-shadow: var(--card-shadow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: var(--danger-color);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .icon-selector {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .icon-search {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .icon-option {
            padding: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-option:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }

        .icon-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .selected-icon-preview {
            text-align: center;
            margin: 12px 0;
            font-size: 2rem;
            color: var(--primary-color);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }

        /* Notificación */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--success-color, #28a745);
            color: white;
            display: none;
            z-index: 2001;
            animation: slideIn 0.3s ease;
        }

        .notification.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .admin-panels {
                grid-template-columns: 1fr;
            }
            
            .roles-list {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .role-item {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 600px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
            
            .icons-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .page-title {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</head>
<body data-theme="light">
    <header-component></header-component>
    <sidebar-component></sidebar-component>

    <div class="main-content">
        <div class="dashboard-section">
            <div class="breadcrumb">
                <a href="/dashboard.html">Dashboard</a> / 
                <a href="manejo-users.html">Gestión de Usuarios</a> / 
                <span>Administrar Accesos</span>
            </div>
            
            <div class="page-title">
                <h1><i class="fas fa-unlock-alt"></i> Configuración de Permisos por Rol</h1>
                <button class="add-module-btn" id="addModuleBtn">
                    <i class="fas fa-plus"></i> Agregar Módulo
                </button>
            </div>
            
            <div class="admin-panels">
                <div class="roles-panel">
                    <div class="panel-title">
                        <i class="fas fa-user-tag"></i> Roles del Sistema
                    </div>
                    <ul class="roles-list" id="rolesList">
                        <!-- Roles se cargarán dinámicamente -->
                    </ul>
                </div>
                
                <div class="modules-panel">
                    <div class="modules-header">
                        <div>
                            <div class="panel-title" style="border-bottom: none; padding-bottom: 0;">
                                <i class="fas fa-th-large"></i> Módulos para: <span id="selectedRole">Administrador</span>
                            </div>
                            <p>Selecciona los módulos a los que tendrá acceso este rol</p>
                        </div>
                    </div>
                    
                    <div class="modules-grid" id="modulesGrid">
                        <div class="loading-text">Cargando módulos...</div>
                    </div>
                    
                    <div class="actions">
                        <button class="btn btn-secondary" id="resetBtn">
                            <i class="fas fa-undo"></i> Restablecer
                        </button>
                        <button class="btn btn-primary" id="saveBtn">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para módulos -->
    <div id="moduleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Módulo</h2>
                <span class="close-modal" id="closeModalBtn">&times;</span>
            </div>
            <form id="moduleForm">
                <input type="hidden" id="moduleId">
                <div class="form-group">
                    <label>Nombre del Módulo</label>
                    <input type="text" id="moduleTitle" required placeholder="Ej: Gestión de Usuarios">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="moduleDescription" required placeholder="Breve descripción del módulo">
                </div>
                <div class="form-group">
                    <label>Icono (FontAwesome)</label>
                    <input type="text" id="moduleIcon" placeholder="fa-users" readonly>
                    <div class="icon-selector">
                        <input type="text" class="icon-search" id="iconSearch" placeholder="Buscar icono...">
                        <div class="icons-grid" id="iconsGrid"></div>
                    </div>
                    <div class="selected-icon-preview">
                        <i id="iconPreview" class="fas fa-cube"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>URL del Módulo</label>
                    <input type="text" id="moduleLink" required placeholder="ej: usuarios.html">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <footer-component></footer-component>

    <script src="header-component.js"></script>
    <script src="sidebar-component.js"></script>
    <script src="footer.js"></script>
    
    <script>
        const firebaseConfig = { databaseURL: "https://agro-productos-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const usersRef = database.ref('login');
        const activeUsersRef = database.ref('uactivos');
        const modulesRef = database.ref('modules');
        const accessRef = database.ref('accesos');

        let currentUser = null;
        let systemModules = [];
        let roleAccess = {};
        let currentRole = 'Administrador';
        let editingModuleId = null;

        // Lista de roles
        const rolesListData = [
            'Administrador', 'Gerente General', 'Gerente de Producción', 'Supervisor',
            'Jefe de Vivero', 'Grower', 'Grower Junior', 'Digitador', 'Técnico Fitosanidad',
            'Técnico Prácticas Culturales', 'Técnico Riego', 'Mezclero Fitosanidad',
            'Consultor', 'Usuario1', 'Usuario2', 'Usuario3', 'Usuario4', 'Invitado'
        ];

        // Iconos comunes
        const commonIcons = [
            'fa-users', 'fa-user-tie', 'fa-clipboard-list', 'fa-database', 'fa-folder-tree',
            'fa-bug', 'fa-list-check', 'fa-flask', 'fa-spray-can', 'fa-eye', 'fa-user-check',
            'fa-chart-line', 'fa-cog', 'fa-wrench', 'fa-seedling', 'fa-leaf', 'fa-tint',
            'fa-calendar', 'fa-bell', 'fa-envelope', 'fa-box', 'fa-truck', 'fa-warehouse',
            'fa-laptop', 'fa-mobile', 'fa-shield-alt', 'fa-lock', 'fa-key', 'fa-id-card',
            'fa-star', 'fa-heart', 'fa-thumbs-up', 'fa-comment', 'fa-trophy'
        ];

        // Tema
        const themes = ['light', 'dark', 'blue', 'orange', 'purple'];
        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('agroalpha-theme');
            if (savedTheme && themes.includes(savedTheme)) {
                document.body.setAttribute('data-theme', savedTheme);
            }
        }

        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        function renderRolesList() {
            const container = document.getElementById('rolesList');
            container.innerHTML = rolesListData.map(role => `
                <li class="role-item ${role === currentRole ? 'active' : ''}" data-role="${role}">
                    <span>${role}</span>
                    ${role === currentRole ? '<i class="fas fa-check-circle"></i>' : ''}
                </li>
            `).join('');
            
            document.querySelectorAll('.role-item').forEach(item => {
                item.addEventListener('click', () => {
                    const role = item.dataset.role;
                    currentRole = role;
                    renderRolesList();
                    renderModulesForRole();
                });
            });
        }

        function renderModulesForRole() {
            const container = document.getElementById('modulesGrid');
            const accessForRole = roleAccess[currentRole] || {};
            
            if (systemModules.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">No hay módulos configurados</div>';
                return;
            }
            
            container.innerHTML = systemModules.map(module => {
                const isEnabled = accessForRole[module.id] || false;
                return `
                    <div class="module-card" data-module-id="${module.id}">
                        <i class="fas fa-trash-alt delete-module" data-module="${module.id}"></i>
                        <div class="module-header">
                            <div class="module-icon"><i class="fas ${module.icon}"></i></div>
                            <div class="module-title">${escapeHtml(module.title)}</div>
                        </div>
                        <div class="module-description">${escapeHtml(module.description)}</div>
                        <div class="module-link">${escapeHtml(module.link)}</div>
                        <div class="module-actions">
                            <span style="font-size:0.7rem;">${isEnabled ? '✓ Habilitado' : '✗ Deshabilitado'}</span>
                            <label class="toggle-switch">
                                <input type="checkbox" ${isEnabled ? 'checked' : ''} data-module="${module.id}">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Eventos de eliminar
            document.querySelectorAll('.delete-module').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteModule(btn.dataset.module);
                });
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function saveAccess() {
            const checkboxes = document.querySelectorAll('#modulesGrid input[type="checkbox"]');
            if (!roleAccess[currentRole]) roleAccess[currentRole] = {};
            
            checkboxes.forEach(cb => {
                roleAccess[currentRole][cb.dataset.module] = cb.checked;
            });
            
            try {
                await accessRef.set(roleAccess);
                showNotification(`Permisos guardados para ${currentRole}`);
            } catch (error) {
                showNotification('Error al guardar: ' + error.message, true);
            }
        }

        async function resetAccess() {
            if (confirm(`¿Restablecer permisos para ${currentRole}?`)) {
                delete roleAccess[currentRole];
                try {
                    await accessRef.set(roleAccess);
                    renderModulesForRole();
                    showNotification(`Permisos restablecidos para ${currentRole}`);
                } catch (error) {
                    showNotification('Error al restablecer', true);
                }
            }
        }

        async function deleteModule(moduleId) {
            if (!confirm('¿Eliminar este módulo? Se eliminará de todos los roles.')) return;
            
            systemModules = systemModules.filter(m => m.id !== moduleId);
            for (let role in roleAccess) {
                if (roleAccess[role][moduleId]) delete roleAccess[role][moduleId];
            }
            
            try {
                await Promise.all([modulesRef.set(systemModules), accessRef.set(roleAccess)]);
                renderModulesForRole();
                showNotification('Módulo eliminado');
            } catch (error) {
                showNotification('Error al eliminar', true);
            }
        }

        function generateModuleId(title) {
            return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        function openModuleModal(module = null) {
            editingModuleId = module?.id || null;
            document.getElementById('modalTitle').textContent = module ? 'Editar Módulo' : 'Agregar Módulo';
            document.getElementById('moduleId').value = module?.id || '';
            document.getElementById('moduleTitle').value = module?.title || '';
            document.getElementById('moduleDescription').value = module?.description || '';
            document.getElementById('moduleIcon').value = module?.icon || '';
            document.getElementById('moduleLink').value = module?.link || '';
            
            const icon = module?.icon || 'fa-cube';
            document.getElementById('iconPreview').className = `fas ${icon}`;
            
            renderIconsGrid(icon);
            document.getElementById('moduleModal').classList.add('active');
        }

        function renderIconsGrid(selectedIcon) {
            const grid = document.getElementById('iconsGrid');
            const searchInput = document.getElementById('iconSearch');
            
            function render(filter = '') {
                const filtered = commonIcons.filter(icon => icon.includes(filter.toLowerCase()));
                grid.innerHTML = filtered.map(icon => `
                    <div class="icon-option ${icon === selectedIcon ? 'selected' : ''}" data-icon="${icon}">
                        <i class="fas ${icon}"></i>
                    </div>
                `).join('');
                
                grid.querySelectorAll('.icon-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        const iconName = opt.dataset.icon;
                        document.getElementById('moduleIcon').value = iconName;
                        document.getElementById('iconPreview').className = `fas ${iconName}`;
                        grid.querySelectorAll('.icon-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    });
                });
            }
            
            render('');
            searchInput.oninput = (e) => render(e.target.value);
        }

        async function saveModule(e) {
            e.preventDefault();
            const title = document.getElementById('moduleTitle').value.trim();
            const description = document.getElementById('moduleDescription').value.trim();
            const icon = document.getElementById('moduleIcon').value.trim();
            const link = document.getElementById('moduleLink').value.trim();
            
            if (!title || !description || !icon || !link) {
                showNotification('Complete todos los campos', true);
                return;
            }
            
            const id = editingModuleId || generateModuleId(title);
            const newModule = { id, title, description, icon, link };
            
            if (editingModuleId) {
                const index = systemModules.findIndex(m => m.id === editingModuleId);
                if (index !== -1) systemModules[index] = newModule;
            } else {
                systemModules.push(newModule);
                if (!roleAccess['Administrador']) roleAccess['Administrador'] = {};
                roleAccess['Administrador'][id] = true;
            }
            
            try {
                await Promise.all([modulesRef.set(systemModules), accessRef.set(roleAccess)]);
                closeModal();
                renderModulesForRole();
                showNotification(editingModuleId ? 'Módulo actualizado' : 'Módulo agregado');
            } catch (error) {
                showNotification('Error al guardar', true);
            }
        }

        function closeModal() {
            document.getElementById('moduleModal').classList.remove('active');
            editingModuleId = null;
        }

        async function loadData() {
            const [modulesSnap, accessSnap] = await Promise.all([
                modulesRef.once('value'),
                accessRef.once('value')
            ]);
            
            const modulesData = modulesSnap.val();
            systemModules = modulesData ? (Array.isArray(modulesData) ? modulesData : Object.values(modulesData)) : [];
            roleAccess = accessSnap.val() || {};
            
            document.getElementById('selectedRole').textContent = currentRole;
            renderModulesForRole();
        }

        async function verificarSesion() {
            const userData = JSON.parse(sessionStorage.getItem('currentUser'));
            if (!userData || !userData.username) {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = userData;
            try {
                const snapshot = await activeUsersRef.child(userData.username).once('value');
                if (!snapshot.exists()) {
                    await cerrarSesion();
                    return false;
                }
                return true;
            } catch (error) {
                return true;
            }
        }

        async function cerrarSesion() {
            if (currentUser?.username) {
                try { await activeUsersRef.child(currentUser.username).remove(); } catch(e) {}
            }
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function setupLogoutListener() {
            document.addEventListener('logout', () => cerrarSesion());
            window.addEventListener('message', (event) => { if (event.data === 'logout') cerrarSesion(); });
        }

        document.addEventListener('DOMContentLoaded', async function() {
            loadSavedTheme();
            const sesionValida = await verificarSesion();
            if (!sesionValida) return;
            
            setupLogoutListener();
            await loadData();
            renderRolesList();
            
            document.getElementById('saveBtn').addEventListener('click', saveAccess);
            document.getElementById('resetBtn').addEventListener('click', resetAccess);
            document.getElementById('addModuleBtn').addEventListener('click', () => openModuleModal());
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
            document.getElementById('moduleForm').addEventListener('submit', saveModule);
            document.getElementById('moduleModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('moduleModal')) closeModal();
            });
            
            const observer = new MutationObserver(() => {
                const currentTheme = document.body.getAttribute('data-theme');
                if (currentTheme) localStorage.setItem('agroalpha-theme', currentTheme);
            });
            observer.observe(document.body, { attributes: true, attributeFilter: ['data-theme'] });
        });
    </script>
</body>
