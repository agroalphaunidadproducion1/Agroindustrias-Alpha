<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistencia - Sistema Agroalpha</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <!-- Estilos globales (mismos que dashboard) -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="components.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Contenido principal */
        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            transition: margin-left 0.3s;
        }

        /* Sección estilo dashboard */
        .dashboard-section {
            margin-bottom: 30px;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        /* Breadcrumb */
        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 i {
            color: var(--primary-color);
            font-size: 2rem;
        }

        /* Grid de tarjetas (solo dos botones grandes) */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: var(--card-shadow);
            text-align: center;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--hover-shadow);
            border-color: var(--primary-light);
        }

        .card:active {
            transform: translateY(0);
        }

        .card-icon {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card h3 {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 12px 0 8px;
            line-height: 1.3;
        }

        .card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Mensajes y estados */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .loading i {
            margin-right: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .cards-container {
                grid-template-columns: 1fr;
                gap: 20px;
                max-width: 100%;
            }
            
            .card {
                padding: 30px 20px;
                min-height: 180px;
            }
            
            .card-icon {
                font-size: 2.8rem;
            }
            
            .card h3 {
                font-size: 1.3rem;
            }
            
            h1 {
                font-size: 1.5rem;
                margin-bottom: 30px;
            }
            
            .dashboard-section {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 16px;
                min-height: 160px;
            }
            
            .card-icon {
                font-size: 2.4rem;
            }
            
            .card h3 {
                font-size: 1.2rem;
            }
        }
    </style>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</head>
<body data-theme="light">
    <!-- COMPONENTES GLOBALES: header y sidebar -->
    <header-component></header-component>
    <sidebar-component></sidebar-component>

    <!-- Contenido principal (Asistencia) -->
    <div class="main-content" id="mainContent">
        <div class="dashboard-section">
            <div class="breadcrumb">
                <a href="/dashboard.html">Dashboard</a> / Asistencia
            </div>
            
            <h1>
                <i class="fas fa-fingerprint"></i> 
                Control de Asistencia
            </h1>
            
            <div class="cards-container" id="assistanceCards">
                <!-- Tarjetas generadas dinámicamente -->
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Cargando opciones...</div>
            </div>
        </div>
    </div>

    <!-- Footer global -->
    <footer-component></footer-component>

    <!-- Scripts de componentes -->
    <script src="header-component.js"></script>
    <script src="sidebar-component.js"></script>
    <script src="footer.js"></script>
    
    <script>
        // Configuración de Firebase (misma que dashboard)
        const firebaseConfig = {
            databaseURL: "https://agro-productos-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const activeUsersRef = database.ref('uactivos');
        
        let currentUser = null;
        
        // Sistema de temas
        const themes = ['light', 'dark', 'blue', 'orange', 'purple'];
        let currentThemeIndex = 0;
        
        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('agroalpha-theme');
            if (savedTheme) {
                currentThemeIndex = themes.indexOf(savedTheme);
                if (currentThemeIndex === -1) currentThemeIndex = 0;
                document.body.setAttribute('data-theme', themes[currentThemeIndex]);
            }
        }
        
        // Verificar sesión
        async function verificarSesion() {
            const userData = JSON.parse(sessionStorage.getItem('currentUser'));
            if (!userData || !userData.username) {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = userData;
            try {
                const snapshot = await activeUsersRef.child(userData.username).once('value');
                if (!snapshot.exists()) {
                    await cerrarSesion();
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Error verificando sesión:', error);
                return true;
            }
        }
        
        async function cerrarSesion() {
            if (currentUser?.username) {
                try {
                    await activeUsersRef.child(currentUser.username).remove();
                } catch(e) { console.error(e); }
            }
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        // Generar tarjetas de asistencia (Redirigen a páginas independientes)
        function generarTarjetasAsistencia() {
            const container = document.getElementById('assistanceCards');
            if (!container) return;
            
            const opciones = [
                { 
                    icono: 'fa-pen-to-square', 
                    titulo: 'Registrar Asistencia', 
                    descripcion: 'Registrar entrada, salida o estado del día',
                    url: 'registrar-asistencia.html'
                },
                { 
                    icono: 'fa-chart-simple', 
                    titulo: 'Reporte de Asistencia', 
                    descripcion: 'Ver historial y estadísticas detalladas',
                    url: 'reporte-asistencia.html'
                }
            ];
            
            container.innerHTML = '';
            
            opciones.forEach(op => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    window.location.href = op.url;
                };
                
                card.innerHTML = `
                    <div class="card-icon"><i class="fas ${op.icono}"></i></div>
                    <h3>${op.titulo}</h3>
                    <p>${op.descripcion}</p>
                `;
                
                container.appendChild(card);
            });
        }
        
        // Listener para cerrar sesión desde componentes
        function setupLogoutListener() {
            document.addEventListener('logout', () => {
                cerrarSesion();
            });
            window.addEventListener('message', (event) => {
                if (event.data === 'logout') cerrarSesion();
            });
        }
        
        // Inicialización completa
        document.addEventListener('DOMContentLoaded', async function() {
            loadSavedTheme();
            const sesionValida = await verificarSesion();
            if (!sesionValida) return;
            
            generarTarjetasAsistencia();
            setupLogoutListener();
            
            // Observador para tema
            const observer = new MutationObserver(() => {
                const currentTheme = document.body.getAttribute('data-theme');
                if (currentTheme) localStorage.setItem('agroalpha-theme', currentTheme);
            });
            observer.observe(document.body, { attributes: true, attributeFilter: ['data-theme'] });
        });
        
        // Exponer función para navegación
        window.navigateTo = function(page) {
            window.location.href = page;
        };
    </script>
</body>
</html>
